name: Playwright UI Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  playwright-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: shop
          POSTGRES_USER: shop
          POSTGRES_PASSWORD: shop
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U shop -d shop"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: Merkel00/shop-spa
          path: shop-spa

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install QA dependencies
        run: npm install

      - name: Install frontend dependencies
        working-directory: shop-spa/frontend
        run: npm install

      - name: Start backend
        working-directory: shop-spa/backend
        run: |
          chmod +x mvnw
          ./mvnw spring-boot:run > backend.log 2>&1 &
      
      - name: Start frontend
        working-directory: shop-spa/frontend
        run: |
          npx ng serve --host 0.0.0.0 > frontend.log 2>&1 &

      - name: Wait for backend
        run: npx wait-on tcp:127.0.0.1:8080 --timeout 120000

      - name: Wait for frontend
        run: |
          npx wait-on http://127.0.0.1:4200 --timeout 12000

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-logs
          path: |
            shop-spa/backend/backend.log
            shop-spa/frontend/frontend.log