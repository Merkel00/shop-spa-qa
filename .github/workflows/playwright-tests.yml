name: Playwright UI Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: shop
          POSTGRES_USER: shop
          POSTGRES_PASSWORD: shop
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U shop -d shop"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: Merkel00/shop-spa
          path: shop-spa

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install QA dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: shop-spa/frontend
        run: npm ci

      - name: Start backend
        working-directory: shop-spa/backend
        run: |
          chmod +x mvnw
          ./mvnw spring-boot:run > backend.log 2>&1 &
      
      - name: Start frontend
        working-directory: shop-spa/frontend
        run: |
          npm run start -- --host 0.0.0.0 > frontend.log 2>&1 &

      - name: Wait for backend
        run: npx wait-on http://127.0.0.1:8080/api/products --timeout 120000

      - name: Wait for frontend
        run: npx wait-on http://127.0.0.1:4200 --timeout 120000

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: playwright-junit.xml
        run: npx playwright test --reporter=list,html,junit

      - name: Publish Playwright summary
        if: always()
        run: |
          node <<'EOF'
          const fs = require('fs');

          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const junitPath = 'playwright-junit.xml';
          const reportPath = 'playwright-report/index.html';
          const tracesPath = 'test-results';
          const logsPath = 'app-logs';

          let total = 'unknown';
          let failures = 'unknown';
          let passed = 'unknown';
          let runtimeSeconds = 'unknown';

          if (fs.existsSync(junitPath)) {
            const xml = fs.readFileSync(junitPath, 'utf8');
            const attrs = Object.fromEntries(
              [...xml.matchAll(/(\w+)="([^"]*)"/g)].map(([, key, value]) => [key, value])
            );

            total = Number(attrs.tests ?? 0);
            failures = Number(attrs.failures ?? 0) + Number(attrs.errors ?? 0);
            passed = total - failures;
            runtimeSeconds = attrs.time ?? 'unknown';
          }

          const lines = [
            '## Playwright E2E Summary',
            '',
            `- Total E2E tests: ${total}`,
            `- Passed: ${passed}`,
            `- Failed: ${failures}`,
            `- Approximate runtime: ${runtimeSeconds}s`,
            `- HTML report artifact: \`playwright-report\` (${reportPath})`,
            `- Raw test artifacts: \`playwright-test-results\` (${tracesPath})`,
            `- App logs artifact: \`app-logs\` (${logsPath})`,
            '',
          ];

          fs.appendFileSync(summaryPath, lines.join('\n'));
          EOF

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload Playwright raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            test-results/
            playwright-junit.xml

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-logs
          path: |
            shop-spa/backend/backend.log
            shop-spa/frontend/frontend.log
